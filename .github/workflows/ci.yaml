name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.4

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test -race -count=1 -timeout 5m ./pkg/...
      - run: go build ./cmd/server/
      - run: go build ./cmd/agent/

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - run: |
          helm lint deploy/helm/argocd-cluster-proxy-server/ \
            --set 'clusters[0].id=test' --set 'clusters[0].token=tok'
          helm lint deploy/helm/argocd-cluster-proxy-agent/ \
            --set serverURL=wss://example.com/connect --set token=tok

  e2e:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: helm/kind-action@v1
        with:
          install_only: true
      - name: Build images
        run: |
          docker build -t argocd-cluster-proxy-server:e2e -f Dockerfile.server .
          docker build -t argocd-cluster-proxy-agent:e2e -f Dockerfile.agent .
      - name: Run e2e tests
        run: go test -count=1 -timeout 10m -tags e2e ./test/e2e/
