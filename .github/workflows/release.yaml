name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write
  pages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  SERVER_IMAGE: ghcr.io/cloud-exit/argocd-proxy-server
  AGENT_IMAGE: ghcr.io/cloud-exit/argocd-proxy-agent

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: server-meta
        with:
          images: ${{ env.SERVER_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - uses: docker/metadata-action@v5
        id: agent-meta
        with:
          images: ${{ env.AGENT_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.server
          push: true
          tags: ${{ steps.server-meta.outputs.tags }}
          labels: ${{ steps.server-meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.agent
          push: true
          tags: ${{ steps.agent-meta.outputs.tags }}
          labels: ${{ steps.agent-meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}

  helm:
    runs-on: ubuntu-latest
    needs: [docker]
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      - name: Set chart version from tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          for chart in deploy/helm/argocd-cluster-proxy-server deploy/helm/argocd-cluster-proxy-agent; do
            sed -i "s/^version:.*/version: ${VERSION}/" ${chart}/Chart.yaml
            sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" ${chart}/Chart.yaml
          done

      - name: Package charts
        run: |
          helm package deploy/helm/argocd-cluster-proxy-server/ -d dist/
          helm package deploy/helm/argocd-cluster-proxy-agent/ -d dist/

      - name: Push charts to GHCR
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin
          for pkg in dist/argocd-cluster-proxy-*.tgz; do
            helm push "${pkg}" oci://${{ env.REGISTRY }}/${OWNER}/charts
          done

      - name: Upload chart artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: dist/argocd-cluster-proxy-*.tgz

      - name: Build Helm repo index
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO_URL="https://${OWNER}.github.io/argocd-cluster-proxy"

          # Download existing index to preserve previous versions.
          curl -sSfL "${REPO_URL}/index.yaml" -o dist/existing-index.yaml 2>/dev/null || true

          if [ -f dist/existing-index.yaml ]; then
            helm repo index dist/ --url "${REPO_URL}" --merge dist/existing-index.yaml
            rm dist/existing-index.yaml
          else
            helm repo index dist/ --url "${REPO_URL}"
          fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  pages:
    runs-on: ubuntu-latest
    needs: [helm]
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
