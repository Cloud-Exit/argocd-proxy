apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "proxy-server.fullname" . }}
  labels:
    {{- include "proxy-server.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "proxy-server.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "proxy-server.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/clusters: {{ include (print $.Template.BasePath "/clusters-secret.yaml") . | sha256sum }}
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.port }}"
        prometheus.io/path: "/metrics"
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "proxy-server.serviceAccountName" . }}
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: server
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          image: {{ include "proxy-server.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - -addr=:{{ .Values.port }}
            - -clusters=/config/clusters.json
            - -log-level={{ .Values.logLevel }}
          env:
            {{- if .Values.existingProxyTokenSecret }}
            - name: PROXY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingProxyTokenSecret }}
                  key: proxy-token
            {{- else if .Values.proxyToken }}
            - name: PROXY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "proxy-server.fullname" . }}-proxy-token
                  key: proxy-token
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
      volumes:
        - name: config
          secret:
            secretName: {{ include "proxy-server.fullname" . }}-clusters
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
