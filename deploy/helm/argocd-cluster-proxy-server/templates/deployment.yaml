apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "proxy-server.fullname" . }}
  labels:
    {{- include "proxy-server.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "proxy-server.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "proxy-server.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/clusters: {{ include (print $.Template.BasePath "/clusters-secret.yaml") . | sha256sum }}
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.internalPort }}"
        prometheus.io/path: "/metrics"
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "proxy-server.serviceAccountName" . }}
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: server
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          image: {{ include "proxy-server.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - -addr=:{{ .Values.port }}
            - -internal-addr=:{{ .Values.internalPort }}
            - -clusters=/config/clusters.json
            - -log-level={{ .Values.logLevel }}
            {{- if .Values.tls.enabled }}
            - -tls-cert=/tls/tls.crt
            - -tls-key=/tls/tls.key
            {{- if .Values.tls.clientCASecret }}
            - -tls-client-ca=/tls-client-ca/ca.crt
            {{- end }}
            {{- end }}
          ports:
            - name: public
              containerPort: {{ .Values.port }}
              protocol: TCP
            - name: internal
              containerPort: {{ .Values.internalPort }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: internal
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: internal
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            {{- if .Values.tls.enabled }}
            - name: tls-cert
              mountPath: /tls
              readOnly: true
            {{- if .Values.tls.clientCASecret }}
            - name: tls-client-ca
              mountPath: /tls-client-ca
              readOnly: true
            {{- end }}
            {{- end }}
      volumes:
        - name: config
          secret:
            secretName: {{ include "proxy-server.fullname" . }}-clusters
        {{- if .Values.tls.enabled }}
        - name: tls-cert
          secret:
            secretName: {{ .Values.tls.certSecret }}
        {{- if .Values.tls.clientCASecret }}
        - name: tls-client-ca
          secret:
            secretName: {{ .Values.tls.clientCASecret }}
        {{- end }}
        {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
