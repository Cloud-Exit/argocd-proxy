{{- /* [C4 fix] Store cluster config (containing agent tokens) in a Secret, not ConfigMap. */}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "proxy-server.fullname" . }}-clusters
  labels:
    {{- include "proxy-server.labels" . | nindent 4 }}
type: Opaque
stringData:
  clusters.json: |
    {{- .Values.clusters | toJson | nindent 4 }}
