{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "proxy-server.fullname" . }}
  labels:
    {{- include "proxy-server.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "proxy-server.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Public port: agents from anywhere (internet via Ingress controller).
    # Authentication is handled at the application layer (mTLS + bearer tokens
    # on the /connect endpoint).
    - ports:
        - protocol: TCP
          port: {{ .Values.port }}
    # Internal port: only from ArgoCD namespace.
    - ports:
        - protocol: TCP
          port: {{ .Values.internalPort }}
      from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.argocd.namespace }}
  egress:
    # Allow DNS resolution.
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow egress to the Kubernetes API (kubernetes.default.svc:443).
    - ports:
        - protocol: TCP
          port: 443
      to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: default
    {{- with .Values.networkPolicy.extraEgress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
