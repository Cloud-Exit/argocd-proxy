{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "proxy-server.fullname" . }}
  labels:
    {{- include "proxy-server.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "proxy-server.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow all sources on the server port. The proxy server must be reachable
    # by both ArgoCD (in-cluster) and agents (external/internet), so
    # namespace-based source restrictions are not practical. Authentication
    # is handled at the application layer (bearer tokens on both endpoints).
    - ports:
        - protocol: TCP
          port: {{ .Values.port }}
  # Egress: deny all. The server never initiates outbound connections —
  # agents connect inbound via WebSocket, and proxy traffic flows over
  # those established tunnels. Return traffic on accepted connections is
  # handled by conntrack (all major CNIs: Calico, Cilium, Weave, Antrea).
  egress: []
{{- end }}
