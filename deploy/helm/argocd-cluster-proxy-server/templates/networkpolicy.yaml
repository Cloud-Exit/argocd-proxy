apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "proxy-server.fullname" . }}
  labels:
    {{- include "proxy-server.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "proxy-server.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Public port: agents from anywhere (internet via Ingress controller).
    # Authentication is handled at the application layer (bearer tokens on
    # the /connect endpoint).
    - ports:
        - protocol: TCP
          port: {{ .Values.port }}
    # Internal port: only from ArgoCD namespace.
    - ports:
        - protocol: TCP
          port: {{ .Values.internalPort }}
      from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.argocd.namespace }}
  # Egress: deny all. The server never initiates outbound connections —
  # agents connect inbound via WebSocket, and proxy traffic flows over
  # those established tunnels. Return traffic on accepted connections is
  # handled by conntrack (all major CNIs: Calico, Cilium, Weave, Antrea).
  egress: []
