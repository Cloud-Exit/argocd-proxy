image:
  repository: ghcr.io/cloud-exit/argocd-proxy-server
  tag: ""  # defaults to appVersion
  pullPolicy: IfNotPresent

replicas: 1
port: 8443          # public port (agents connect via Ingress)
internalPort: 8080  # internal port (ArgoCD tunnel, metrics)
logLevel: info

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    memory: 256Mi

metricsPort: 0  # deprecated: metrics are now served on internalPort

pdb:
  enabled: false
  minAvailable: 1

topologySpreadConstraints: []
  # - maxSkew: 1
  #   topologyKey: kubernetes.io/hostname
  #   whenUnsatisfiable: DoNotSchedule
  #   labelSelector:
  #     matchLabels: {}  # auto-filled from selectorLabels

nodeSelector: {}
tolerations: []
affinity: {}
podAnnotations: {}

service:
  type: ClusterIP
  port: 8443          # public service port
  internalPort: 8080  # internal service port

# -- Cluster definitions. Each entry allows an agent with the matching token
# to connect and (optionally) creates an ArgoCD cluster secret.
clusters: []
  # - id: customer-a
  #   token: "<random-token>"
  #   targetAddr: "kubernetes.default.svc:443"  # optional, used by server for dial

# -- ArgoCD integration: create cluster secrets in the ArgoCD namespace so
# ArgoCD can target proxied clusters automatically.
argocd:
  enabled: false
  namespace: argocd  # namespace where ArgoCD is installed
  # -- Base64-encoded CA cert for ArgoCD to verify the proxy server (when TLS enabled).
  caData: ""
  # -- Base64-encoded client certificate for ArgoCD to present to the proxy (when mTLS enabled).
  clientCertData: ""
  # -- Base64-encoded client private key for ArgoCD (when mTLS enabled).
  clientKeyData: ""

serviceAccount:
  create: true
  name: ""
  annotations: {}

# -- TLS configuration. When enabled, both ports serve TLS.
# If clientCASecret is also set, the server requires client certificates (mTLS).
tls:
  enabled: false
  certSecret: ""      # name of Secret containing tls.crt and tls.key
  clientCASecret: ""  # name of Secret containing ca.crt for mTLS

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""
