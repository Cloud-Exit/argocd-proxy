image:
  repository: ghcr.io/cloud-exit/argocd-proxy-server
  tag: ""  # defaults to appVersion
  pullPolicy: IfNotPresent

replicas: 1
port: 8443          # public port (agents connect via Ingress)
internalPort: 8080  # internal port (ArgoCD tunnel, metrics)
logLevel: info

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    memory: 256Mi

metricsPort: 0  # deprecated: metrics are now served on internalPort

pdb:
  enabled: false
  minAvailable: 1

topologySpreadConstraints: []
  # - maxSkew: 1
  #   topologyKey: kubernetes.io/hostname
  #   whenUnsatisfiable: DoNotSchedule
  #   labelSelector:
  #     matchLabels: {}  # auto-filled from selectorLabels

nodeSelector: {}
tolerations: []
affinity: {}
podAnnotations: {}

service:
  type: ClusterIP
  port: 8443          # public service port
  internalPort: 8080  # internal service port

# -- Cluster definitions. Each entry allows an agent with the matching token
# to connect and (optionally) creates an ArgoCD cluster secret.
clusters: []
  # - id: customer-a
  #   token: "<random-token>"
  #   targetAddr: "kubernetes.default.svc:443"  # optional, used by server for dial

# -- ArgoCD integration: create cluster secrets in the ArgoCD namespace so
# ArgoCD can target proxied clusters automatically.
argocd:
  enabled: false
  namespace: argocd  # namespace where ArgoCD is installed
  # -- Base64-encoded CA cert for ArgoCD to verify the proxy server (when TLS enabled).
  caData: ""
  # -- Base64-encoded client certificate for ArgoCD to present to the proxy (when mTLS enabled).
  clientCertData: ""
  # -- Base64-encoded client private key for ArgoCD (when mTLS enabled).
  clientKeyData: ""

serviceAccount:
  create: true
  name: ""
  annotations: {}

# -- TLS configuration. When enabled, both ports serve TLS.
# If clientCASecret is also set, the server requires client certificates (mTLS).
tls:
  enabled: false
  certSecret: ""      # name of Secret containing tls.crt and tls.key
  clientCASecret: ""  # name of Secret containing ca.crt for mTLS

ingress:
  enabled: false
  className: ""
  annotations: {}
    # nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts: []
    # - host: proxy.example.com
    #   paths:
    #     - path: /
    #       pathType: ImplementationSpecific
  tls: []
    # - secretName: proxy-tls
    #   hosts:
    #     - proxy.example.com

# -- Gateway API support. Use this instead of ingress when your cluster
# uses Gateway API (e.g. Traefik, Envoy Gateway, Istio).
# Only /connect is exposed — /tunnel/ stays internal.
gateway:
  enabled: false
  # -- Create a Gateway resource. Set to false to reference an existing gateway
  # via parentRefs instead.
  create: true
  # -- Gateway class (e.g. traefik, istio, envoy-gateway).
  className: traefik
  # -- Public hostname for the proxy server.
  hostname: ""
  # -- TLS mode for the Gateway listener:
  #   Terminate   — Gateway terminates TLS and forwards plain HTTP to the server.
  #                 Use with HTTPRoute. Requires gateway.tls.secretName or certIssuer.
  #   Passthrough — Gateway passes TLS through to the server untouched.
  #                 Use with TLSRoute. Required for mTLS (the server must see the
  #                 client certificate). The server handles TLS termination itself
  #                 (tls.enabled + tls.certSecret must be set).
  tlsMode: Terminate
  # -- cert-manager ClusterIssuer for automatic TLS certificate provisioning.
  # Only used when tlsMode: Terminate.
  certIssuer: ""
  # -- TLS configuration for the Gateway listener (Terminate mode only).
  tls:
    secretName: ""  # defaults to <fullname>-ingress-tls
  # -- Annotations applied to the Gateway resource.
  annotations: {}
    # external-dns.alpha.kubernetes.io/hostname: proxy.example.com
  # -- Additional listeners beyond the default listener.
  extraListeners: []
  # -- Parent gateway references (only used when create: false).
  parentRefs: []
    # - name: shared-gateway
    #   namespace: gateway-system
    #   sectionName: https
  # -- Additional hostnames for the route (beyond gateway.hostname).
  hostnames: []
  # -- Annotations applied to the HTTPRoute/TLSRoute resource.
  route:
    annotations: {}

networkPolicy:
  enabled: true
  # -- Additional egress rules beyond DNS and K8s API.
  extraEgress: []

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""
