apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "proxy-agent.fullname" . }}
  labels:
    {{- include "proxy-agent.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "proxy-agent.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "proxy-agent.selectorLabels" . | nindent 8 }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.healthPort }}"
        prometheus.io/path: "/metrics"
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "proxy-agent.serviceAccountName" . }}
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: agent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          image: {{ include "proxy-agent.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - -server={{ required "serverURL is required" .Values.serverURL }}
            - -target={{ .Values.targetAddr }}
            - -sa-token-path={{ .Values.saTokenPath }}
            - -log-level={{ .Values.logLevel }}
            - -max-retry={{ .Values.maxRetryInterval }}
            - -health-addr=:{{ .Values.healthPort }}
            {{- if .Values.insecure }}
            - -insecure
            {{- end }}
          env:
            - name: TOKEN
              valueFrom:
                secretKeyRef:
                  {{- if .Values.existingSecret }}
                  name: {{ .Values.existingSecret }}
                  {{- else }}
                  name: {{ include "proxy-agent.fullname" . }}-token
                  {{- end }}
                  key: token
          ports:
            - name: health
              containerPort: {{ .Values.healthPort }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
