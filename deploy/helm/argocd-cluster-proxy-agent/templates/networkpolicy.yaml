{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "proxy-agent.fullname" . }}
  labels:
    {{- include "proxy-agent.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "proxy-agent.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Health/metrics port only. Kubelet probes and Prometheus scraping.
    - ports:
        - protocol: TCP
          port: {{ .Values.healthPort }}
      {{- with .Values.networkPolicy.ingressFrom }}
      from:
        {{- toYaml . | nindent 8 }}
      {{- end }}
  egress:
    # Allow DNS resolution. No destination restriction — DNS infrastructure
    # varies across clusters (CoreDNS in kube-system, node-local DNS cache,
    # custom setups) and restricting by namespace is fragile.
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow egress to the Kubernetes API (kubernetes.default.svc:443).
    - ports:
        - protocol: TCP
          port: 443
      to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: default
    # Allow egress to the proxy server. Security is enforced by mTLS —
    # the agent must present a valid client certificate to connect.
    {{- if .Values.networkPolicy.proxyServerCIDR }}
    - ports:
        - protocol: TCP
          port: 443
      to:
        - ipBlock:
            cidr: {{ .Values.networkPolicy.proxyServerCIDR }}
    {{- else }}
    # No proxyServerCIDR set — allow HTTPS egress to any destination so the
    # agent can reach the proxy server. Set networkPolicy.proxyServerCIDR to
    # restrict this to the server's IP.
    - ports:
        - protocol: TCP
          port: 443
    {{- end }}
    {{- with .Values.networkPolicy.extraEgress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
